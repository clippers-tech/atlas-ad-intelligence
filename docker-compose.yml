version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    networks: [atlas-net]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: ./frontend/.env.local
    depends_on: [backend]
    networks: [atlas-net]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    networks: [atlas-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [atlas-net]

volumes:
  postgres_data:

networks:
  atlas-net:
    driver: bridge
